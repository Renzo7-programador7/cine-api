<div class="container">
  <h2>Usuarios</h2>
  <nav>
    <a routerLink="/peliculas">Películas</a> |
    <a routerLink="/funciones">Funciones</a> |
    <a routerLink="/boletos">Boletos</a> |
    <a routerLink="/usuarios">Usuarios</a>
  </nav>

  <h3>Lista de Usuarios</h3>
  <table>
    <tr>
      <th>ID</th><th>Nombre</th><th>Email</th><th>Rol</th><th>Acciones</th>
    </tr>
    <tr *ngFor="let u of usuarios">
      <td>{{ u.id }}</td>
      <td>{{ u.nombre }}</td>
      <td>{{ u.email }}</td>
      <td>{{ u.rol }}</td>
      <td>
        <button (click)="eliminar(u.id)">Eliminar</button>
      </td>
    </tr>
  </table>
</div>
