<div class="container">

  <header class="header">
    <h2>{{ titulo }}</h2>

    <div class="user-panel">

      <div class="user-data">
        <span class="user-email">{{ email }}</span>
        <span class="user-role">{{ rol }}</span>
        <span class="user-name">{{ usuario }}</span>
      </div>

      <button class="btn-logout" (click)="logout()">
        Cerrar sesión
      </button>

    </div>
  </header>

  <nav class="menu">
    <a routerLink="/">Inicio</a>
    <a routerLink="/peliculas">Películas</a>
    <a routerLink="/funciones">Funciones</a>
    <a routerLink="/boletos">Boletos</a>
    <a routerLink="/usuarios">Usuarios</a>
  </nav>

  <ng-content></ng-content>

</div>
