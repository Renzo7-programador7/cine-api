<div class="register-page">
  <section class="register-hero" aria-hidden="true">
    <img src="/images/cinegest-login-hero.png" alt="CineGest" class="register-hero__image" />
  </section>

  <section class="register-panel">
    <div class="register-card">
      <div class="register-card__header">
        <p class="register-card__eyebrow">Crea tu cuenta</p>
        <h2>Regístrate en CineGest</h2>
        <p class="register-card__subtitle">
          Crea tu acceso como usuario para disfrutar de la plataforma.
        </p>
      </div>

      <div *ngIf="error" class="register-error">{{ error }}</div>

      <form class="register-form" (ngSubmit)="register()">
        <div class="field">
          <label for="nombre">Nombre</label>
          <input id="nombre" type="text" [(ngModel)]="usuario.nombre" name="nombre" placeholder="Tu nombre"
            autocomplete="name" required />
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" [(ngModel)]="usuario.email" name="email" placeholder="tu@email.com"
            autocomplete="email" required />
        </div>

        <div class="field">
          <label for="password">Contraseña</label>
          <input id="password" type="password" [(ngModel)]="usuario.password" name="password" placeholder="••••••••"
            autocomplete="new-password" required />
        </div>
        <button type="submit">Registrarse</button>
      </form>

      <p class="register-footer">
        ¿Ya tienes cuenta?
        <a routerLink="/login">Inicia sesión</a>
      </p>
      <p class="register-back">
        <a (click)="volver()">← Volver a la cartelera</a>
      </p>
    </div>
  </section>
</div>
