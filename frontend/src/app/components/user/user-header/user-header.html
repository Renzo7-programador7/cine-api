<header class="navbar">
  <div class="logo">
    <span class="logo-icon">🎬</span>
    <h1>Cine<span>Gest</span></h1>
  </div>
  <div class="navbar-actions">
    @if (!autenticado) {
    <a routerLink="/login" class="btn-ingresar"> Ingresar </a>
    <a routerLink="/register" class="nav-link"> Registrarse </a>
    }
    @else {
    <div class="account-summary" aria-label="Usuario autenticado">
      <span class="account-avatar" aria-hidden="true">{{ inicialUsuario }}</span>
      <span class="account-details">
        <strong class="account-name">{{ usuario }}</strong>
        <span class="account-email" [title]="email">{{ email }}</span>
      </span>
    </div>
    <button class="btn-logout" (click)="logout()"> Cerrar sesion </button>
    }
    @if (rol === 'ADMIN') {
    <a routerLink="/usuarios" class="btn-ingresar"> Administrar </a>
    }
  </div>
</header>
<nav class="subnav">
  <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" class="subnav-item"> En Cartelera </a>
  <span class="subnav-sep">|</span>
  <a routerLink="/proximamente" routerLinkActive="active" class="subnav-item"> Próximamente </a>
  <span class="subnav-sep">|</span>
  <a routerLink="/promociones" routerLinkActive="active" class="subnav-item"> Promociones </a>
  <span class="subnav-sep">|</span>
  <a [routerLink]="autenticado ? '/boletos' : '/login'"
    [fragment]="autenticado ? 'comprar-entradas' : undefined"
    [queryParams]="autenticado ? null : { returnUrl: '/boletos#comprar-entradas' }"
    class="subnav-item ticket-link">
    Comprar entradas
  </a>
  @if (autenticado && rol !== 'ADMIN') {
  <span class="subnav-sep">|</span>
  <a routerLink="/boletos" fragment="mis-boletos" class="subnav-item my-tickets-link">
    Mis boletos
  </a>
  }
</nav>
