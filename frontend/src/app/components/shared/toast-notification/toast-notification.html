@if (mensaje) {
  <aside class="toast" [class.error]="tipo === 'error'"
    [attr.role]="tipo === 'error' ? 'alert' : 'status'" aria-live="polite">
    <span class="toast-icon" aria-hidden="true">{{ tipo === 'error' ? '!' : '✓' }}</span>
    <p>{{ mensaje }}</p>
    <button type="button" aria-label="Cerrar notificación" (click)="cerrar()">×</button>
  </aside>
}
